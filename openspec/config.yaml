schema: spec-driven

# General principles shown to AI when generating OpenSpec artifacts for the
# hydrolix/sqlds fork. This is a Go library (the sqlds query-pipeline layer)
# consumed by Grafana datasource plugins.
#
# Hierarchy: MUST = enforced by CI/review. SHOULD = strong recommendation.
# CAN = allowed without extra approval.
context: |
  # hydrolix/sqlds

  Fork of grafana/sqlds carrying extension points (pluggable interpolator,
  connection cache, ...) ahead of their upstream release. The fork is
  consumed by the Hydrolix Grafana datasource plugin via a `replace`
  directive; changes here ripple into that plugin.

  ## Code style
  - MUST wrap Go errors with `%w`; use `errors.Is` / `errors.As` for control
    flow, never string matching.
  - MUST pass `ctx context.Context` first; honor `Done` and deadlines.
  - SHOULD return concrete types and accept interfaces.
  - SHOULD prefer Go stdlib and the Grafana plugin SDK over new dependencies.
  - MUST NOT comment WHAT the code does. Add a comment only when the WHY is
    non-obvious.
  - SHOULD keep the public extension surface as thin as the job needs — a
    first-class `func` field over an interface when a single method suffices.

  ## Extension-surface invariants
  - Extension points are pre-release: BREAKING changes are acceptable while
    upstream has not released them, but MUST be marked **BREAKING** and the
    downstream plugin updated in lockstep.
  - A new optional field MUST default safely: a zero-value `SQLDatasource`
    built without `NewDatasource` must not panic.

  ## Testing
  - MUST add Go unit tests for new code with branching logic. Run with `-race`.
  - MUST preserve byte-for-byte parity for the legacy macro path when
    refactoring the default interpolation behaviour.

# Per-artifact rules — keep proposals / designs / specs / tasks tight and
# reviewable.
rules:
  proposal:
    - Keep under ~500 words. Lead with "Why"; defer "How" to design.md.
    - The proposal is self-contained; it MUST NOT cross-reference design.md.
    - `What Changes` lists capability-level surfaces only, one line per bullet;
      no function bodies, no test enumeration. Mark breaking changes **BREAKING**.
    - `Capabilities` uses kebab-case names matching `specs/<name>/`.
  design:
    - Each decision states its rationale. List rejected alternatives only when
      a reasonable reader might have picked them.
    - Risks formatted "[Risk] → Mitigation" with the proving signal.
  specs:
    - Scenarios use exactly four hashtags (`#### Scenario:`).
    - Use SHALL/MUST in requirement text. Avoid should/may in normative text.
    - Every requirement gets at least one scenario shaped as a test.
  tasks:
    - Group by `## N. <Group>`. Each task is `- [ ] N.M ...`.
    - Order by dependency. Implementation before tests.
