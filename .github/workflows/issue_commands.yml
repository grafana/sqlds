name: Run commands when issues are labeled
permissions: {}

on:
  issues:
    types: [labeled]
jobs:
  main:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: "grafana/grafana-github-actions"
          persist-credentials: false
          path: ./actions
          ref: 3c62d35c5a66e730186a338e45aeb8fa784e2d56 # main
      - name: Install Actions
        run: npm install --omit=dev --ignore-scripts --prefix ./actions
      - name: Run Commands
        uses: ./actions/commands
        with:
          token: ${{ secrets.ISSUE_COMMANDS_TOKEN }}
          configPath: issue_commands
